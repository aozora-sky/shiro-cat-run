<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$SHIRO cat run🐈</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const SERVER_URL = 'http://ここにサーバーアドレスを記載'; // 運用時に変更してください

        const config = {
            type: Phaser.AUTO,
            width: 450,
            height: 800,
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 1600 }, debug: false }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);

        let player, grounds, enemies, items, coins;
        let score = 0, bonusScore = 0;
        let gameSpeed = 5;
        let jumpCount = 0, maxJumps = 2;
        let isInvincible = false, scoreMultiplier = 1;
        let scoreText, scoreTimer;
        let lastGroundY = 700; 
        let lastEnemyX = 0;
        let isGameOver = false;
        
        let bgm, seGameOver;
        let itemCounts = { banana: 0, budo: 0, cat035: 0, hogo: 0, shiro: 0 };
        let playCount = parseInt(localStorage.getItem('shiro_play_count') || '0');
        let currentBgKey = 'daytime';

        // 効果時間延長用のタイマー管理変数
        let timerBanana, timerBudo, timer035;

        function preload() {
            this.load.image('daytime', 'assets/daytime.jpg');
            this.load.image('sunset', 'assets/sunset.jpg');
            this.load.image('night', 'assets/night.jpg');
            this.load.image('moon', 'assets/moon.jpg');
            this.load.image('cat', 'assets/Cat.png');
            this.load.image('cat1', 'assets/cat1.png');
            this.load.image('ground', 'assets/ground.png');
            this.load.image('bee', 'assets/bee.png');
            this.load.image('banana', 'assets/banana.png');
            this.load.image('budo', 'assets/budo.png');
            this.load.image('035', 'assets/035.png');
            this.load.image('hogo_cat', 'assets/hogo_cat.png');
            this.load.image('shiro_coin', 'assets/shiro_coin.png');
            this.load.audio('music', 'assets/music.mp3');
            this.load.audio('gameover_se', 'assets/gameover.mp3');
        }

        function create() {
            score = 0; bonusScore = 0; gameSpeed = 5; jumpCount = 0; maxJumps = 2;
            isInvincible = false; scoreMultiplier = 1; lastGroundY = 700; isGameOver = false;
            currentBgKey = 'daytime';
            itemCounts = { banana: 0, budo: 0, cat035: 0, hogo: 0, shiro: 0 };
            playCount++;
            localStorage.setItem('shiro_play_count', playCount);

            if (!bgm) bgm = this.sound.add('music', { loop: true, volume: 0.5 });
            seGameOver = this.sound.add('gameover_se', { volume: 0.7 });

            this.backGround = this.add.tileSprite(225, 400, 450, 800, 'daytime');
            grounds = this.physics.add.group({ allowGravity: false, immovable: true });
            enemies = this.physics.add.group({ allowGravity: false });
            items = this.physics.add.group({ allowGravity: false });
            coins = this.physics.add.group({ allowGravity: false });

            if (!this.anims.exists('run')) {
                this.anims.create({
                    key: 'run',
                    frames: [{ key: 'cat' }, { key: 'cat1' }],
                    frameRate: 3,
                    repeat: -1
                });
            }

            player = this.physics.add.sprite(100, 400, 'cat');
            player.play('run');
            player.setCollideWorldBounds(true);
            player.body.world.setBounds(0, 0, 450, 900); 

            scoreText = this.add.text(20, 20, '', { fontSize: '24px', fill: '#fff', stroke: '#000', strokeThickness: 4 });

            this.physics.add.collider(player, grounds);
            this.physics.add.overlap(player, enemies, hitEnemy, null, this);
            this.physics.add.overlap(player, items, collectItem, null, this);
            this.physics.add.overlap(player, coins, collectCoin, null, this);

            scoreTimer = this.time.addEvent({ 
                delay: 100, callback: () => { score += (1 * scoreMultiplier); }, callbackScope: this, loop: true 
            });
            this.spawnTimer = this.time.addEvent({ delay: 350, callback: spawnObstacle, callbackScope: this, loop: true });

            for (let i = 0; i < 5; i++) {
                let g = grounds.create(i * 128, 700, 'ground');
                g.body.checkCollision.down = false;
                g.body.checkCollision.left = false;
                g.body.checkCollision.right = false;
            }
            this.input.on('pointerdown', jump, this);
        }

        function update() {
            if (isGameOver) return;
            
            let totalScore = score + bonusScore;
            let nextKey = currentBgKey;

            if (totalScore >= 30000) {
                nextKey = 'moon';
            } else {
                let cycle = Math.floor(totalScore / 5000) % 4;
                if (cycle === 1 || cycle === 3) nextKey = 'sunset';
                else if (cycle === 2) nextKey = 'night';
                else nextKey = 'daytime';
            }

            if (currentBgKey !== nextKey) {
                currentBgKey = nextKey;
                this.backGround.setTexture(nextKey);
            }

            this.backGround.tilePositionX += gameSpeed * 0.5;
            gameSpeed += 0.0005;

            [grounds, enemies, items, coins].forEach(group => {
                group.getChildren().forEach(child => {
                    child.x -= gameSpeed;
                    if (child.x < -150) child.destroy();
                });
            });

            if (player.body.touching.down) jumpCount = 0;
            if (player.y > 850) gameOver.call(this);

            scoreText.setText(`Score: ${Math.floor(totalScore)}m\n${scoreMultiplier > 1 ? '!! DOUBLE SCORE !!' : ''}`);
        }

        function jump() {
            if (isGameOver) return;
            if (bgm && !bgm.isPlaying) bgm.play();
            if (jumpCount < maxJumps) { player.setVelocityY(-500); jumpCount++; }
        }

        function spawnObstacle() {
            if (isGameOver) return;
            let x = 600;
            if (Math.random() > 0.19) {
                let nextY = Phaser.Math.Clamp(lastGroundY + Phaser.Math.Between(-40, 40), 500, 750);
                let g = grounds.create(x, nextY, 'ground');
                g.body.checkCollision.down = false;
                g.body.checkCollision.left = false;
                g.body.checkCollision.right = false;
                lastGroundY = nextY;
            }
            const h = Phaser.Math.RND.pick([lastGroundY - 60, lastGroundY - 120, lastGroundY - 180]);
            let st = Math.random();
            
            if (st < 0.12 && (x - lastEnemyX > 100)) { 
                enemies.create(x, h, 'bee'); lastEnemyX = x; 
            } 
            else if (st < 0.17) { 
                let it = Math.random();
                if (it < 0.2) items.create(x, h, 'banana').setName('banana');
                else if (it < 0.4) items.create(x, h, 'budo').setName('budo');
                else if (it < 0.6) items.create(x, h, '035').setName('035');
                else items.create(x, h, 'hogo_cat').setName('hogo_cat');
            } 
            else if (st < 0.30) { 
                coins.create(x, h, 'shiro_coin'); 
            }
            lastEnemyX -= gameSpeed;
        }

        function collectItem(p, i) {
            const type = i.name; i.destroy();
            
            if (type === 'banana') { 
                itemCounts.banana++; 
                maxJumps = 3;
                if (timerBanana) timerBanana.remove(); // 既存タイマーを破棄
                timerBanana = this.time.delayedCall(5000, () => { maxJumps = 2; });
            }
            else if (type === 'budo') { 
                itemCounts.budo++; 
                scoreMultiplier = 2; 
                p.setTint(0xff00ff);
                if (timerBudo) timerBudo.remove();
                timerBudo = this.time.delayedCall(5000, () => { scoreMultiplier = 1; p.clearTint(); });
            }
            else if (type === '035') { 
                itemCounts.cat035++; 
                isInvincible = true; 
                p.setAlpha(0.5);
                if (timer035) timer035.remove();
                timer035 = this.time.delayedCall(5000, () => { isInvincible = false; p.setAlpha(1); });
            }
            else if (type === 'hogo_cat') { 
                itemCounts.hogo++; 
                gameSpeed *= 0.975; 
            }
        }

        function collectCoin(p, c) { c.destroy(); itemCounts.shiro++; bonusScore += 500; }
        function hitEnemy(p, e) { if (isInvincible) e.destroy(); else gameOver.call(this); }

        async function gameOver() {
            if (isGameOver) return;
            isGameOver = true;
            this.physics.pause(); player.stop(); scoreTimer.remove(); this.spawnTimer.remove();
            if (bgm) bgm.stop(); seGameOver.play();

            const finalScore = Math.floor(score + bonusScore);
            saveGameLog(finalScore);

            this.add.rectangle(225, 400, 450, 800, 0x000000, 0.9);
            this.add.text(225, 60, 'GAME OVER', { fontSize: '40px', fill: '#f00', fontWeight: 'bold' }).setOrigin(0.5);
            this.add.text(225, 120, `走破距離 ${finalScore}m`, { fontSize: '28px', fill: '#fff' }).setOrigin(0.5);
            const itemText = `🍌x${itemCounts.banana} 🍇x${itemCounts.budo} 035x${itemCounts.cat035} 🐈x${itemCounts.hogo} 🪙x${itemCounts.shiro}`;
            this.add.text(225, 160, itemText, { fontSize: '18px', fill: '#ffff00' }).setOrigin(0.5);

            this.add.text(225, 220, 'ーー TOP RANKING ーー', { fontSize: '18px', fill: '#aaa' }).setOrigin(0.5);
            fetchRanking.call(this);

            const btnStyle = { fontSize: '20px', fill: '#000', backgroundColor: '#fff', padding: {x:20, y:10} };
            const regBtn = this.add.text(225, 520, 'ランキングに登録する', btnStyle).setOrigin(0.5).setInteractive();
            regBtn.on('pointerdown', () => registerRanking(finalScore));

            const xBtn = this.add.text(225, 590, 'X (Twitter) で共有', { ...btnStyle, backgroundColor: '#1DA1F2', fill: '#fff' }).setOrigin(0.5).setInteractive();
            xBtn.on('pointerdown', () => shareToX(finalScore));

            const restartBtn = this.add.text(225, 700, 'Tap to Restart', { fontSize: '24px', fill: '#ffff00' }).setOrigin(0.5).setInteractive();
            restartBtn.on('pointerdown', () => this.scene.restart());
            this.add.text(225, 740, 'Produced by aoba724（あおぞら）', { fontSize: '14px', fill: '#ffffff' }).setOrigin(0.5);
        }

        async function saveGameLog(fScore) {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const log = { playCount, score: fScore, date: new Date().toLocaleString(), ip: ipData.ip };
                fetch(SERVER_URL + '/log', { method: 'POST', body: JSON.stringify(log) }).catch(()=>{});
            } catch (e) {}
        }

        async function fetchRanking() {
            const dummy = [{name: "ShiroMaster", score: 15400}, {name: "NekoRun", score: 12000}, {name: "035Lover", score: 8500}];
            dummy.forEach((item, i) => {
                this.add.text(225, 260 + (i * 35), `${i+1}. ${item.name} - ${item.score}m`, { fontSize: '20px', fill: '#fff' }).setOrigin(0.5);
            });
        }

        function registerRanking(fScore) {
            const name = prompt("ユーザーネームを入力してください", "Player");
            if (name) alert("ランキングに送信しました！");
        }

        function shareToX(fScore) {
            const totalItems = itemCounts.banana+itemCounts.budo+itemCounts.cat035+itemCounts.hogo+itemCounts.shiro;
            const itemsStr = `🍌x${itemCounts.banana} 🍇x${itemCounts.budo} 035x${itemCounts.cat035} 🐈x${itemCounts.hogo} 🪙x${itemCounts.shiro}`;
            const text = encodeURIComponent(`$SHIRO cat runで ${fScore}m 走破しました！\nItem ×${totalItems}個（${itemsStr}）\n\nゲームプレイはこちらから\n${SERVER_URL}\n\n#ShiroCatRun $SHIRO #035HP`);
            window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
        }
    </script>
</body>
</html>

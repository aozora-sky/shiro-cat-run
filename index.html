<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$SHIRO cat run🐈</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const GAME_URL = 'https://aozora-sky.github.io/shiro-cat-run/'; // 共有用URL

        const config = {
            type: Phaser.AUTO,
            width: 450,
            height: 800,
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 1600 }, debug: false }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);

        let player, grounds, enemies, items, coins, backGround;
        let score = 0, bonusScore = 0, gameSpeed = 5;
        let jumpCount = 0, maxJumps = 2;
        let isInvincible = false, scoreMultiplier = 1;
        let scoreText, scoreTimer, spawnTimer;
        let lastGroundY = 700, lastEnemyX = 0, isGameOver = false;
        let bgm, seGameOver;
        let itemCounts = { banana: 0, budo: 0, cat035: 0, hogo: 0, shiro: 0 };
        let currentBgKey = 'daytime';
        let timerBanana, timerBudo, timer035;

        function preload() {
            // アセットパス
            this.load.image('daytime', 'assets/daytime.jpg');
            this.load.image('sunset', 'assets/sunset.jpg');
            this.load.image('night', 'assets/night.jpg');
            this.load.image('moon', 'assets/moon.jpg');
            this.load.image('cat', 'assets/Cat.png');
            this.load.image('cat1', 'assets/cat1.png');
            this.load.image('ground', 'assets/ground.png');
            this.load.image('bee', 'assets/bee.png');
            this.load.image('banana', 'assets/banana.png');
            this.load.image('budo', 'assets/budo.png');
            this.load.image('035', 'assets/035.png');
            this.load.image('hogo_cat', 'assets/hogo_cat.png');
            this.load.image('shiro_coin', 'assets/shiro_coin.png');
            this.load.audio('music', 'assets/music.mp3');
            this.load.audio('gameover_se', 'assets/gameover.mp3');
        }

        function create() {
            // 初期化
            score = 0; bonusScore = 0; gameSpeed = 5; jumpCount = 0; maxJumps = 2;
            isInvincible = false; scoreMultiplier = 1; lastGroundY = 700; isGameOver = false;
            itemCounts = { banana: 0, budo: 0, cat035: 0, hogo: 0, shiro: 0 };

            if (!bgm) bgm = this.sound.add('music', { loop: true, volume: 0.5 });
            seGameOver = this.sound.add('gameover_se', { volume: 0.7 });

            this.backGround = this.add.tileSprite(225, 400, 450, 800, 'daytime');

            grounds = this.physics.add.group({ allowGravity: false, immovable: true });
            enemies = this.physics.add.group({ allowGravity: false });
            items = this.physics.add.group({ allowGravity: false });
            coins = this.physics.add.group({ allowGravity: false });

            // アニメーション作成（修正ポイント：確実にキーを登録）
            if (!this.anims.exists('run')) {
                this.anims.create({
                    key: 'run',
                    frames: [{ key: 'cat' }, { key: 'cat1' }],
                    frameRate: 6, // 1秒に3往復(6フレーム分)
                    repeat: -1
                });
            }

            player = this.physics.add.sprite(100, 400, 'cat');
            
            // めり込み防止の重要設定
            // 判定をキャラの下半分に絞り、setSizeの第3引数をtrueに
            player.body.setSize(player.width * 0.7, player.height * 0.8, true);
            player.setCollideWorldBounds(true);

            player.play('run');

            scoreText = this.add.text(20, 20, '', { fontSize: '24px', fill: '#fff', stroke: '#000', strokeThickness: 4 });

            this.physics.add.collider(player, grounds);
            this.physics.add.overlap(player, enemies, hitEnemy, null, this);
            this.physics.add.overlap(player, items, collectItem, null, this);
            this.physics.add.overlap(player, coins, collectCoin, null, this);

            scoreTimer = this.time.addEvent({ 
                delay: 100, callback: () => { if(!isGameOver) score += (1 * scoreMultiplier); }, callbackScope: this, loop: true 
            });
            this.spawnTimer = this.time.addEvent({ delay: 350, callback: spawnObstacle, callbackScope: this, loop: true });

            // 初期足場
            for (let i = 0; i < 6; i++) {
                let g = grounds.create(i * 128, 700, 'ground');
                g.body.checkCollision.down = false;
                g.body.checkCollision.left = false;
                g.body.checkCollision.right = false;
            }
            this.input.on('pointerdown', jump, this);
        }

        function update() {
            if (isGameOver) return;
            
            let totalScore = score + bonusScore;
            
            // 背景スクロール
            this.backGround.tilePositionX += gameSpeed * 0.5;
            gameSpeed += 0.0005;

            // オブジェクト移動
            [grounds, enemies, items, coins].forEach(group => {
                group.getChildren().forEach(child => {
                    child.x -= gameSpeed;
                    if (child.x < -100) child.destroy();
                });
            });

            // アニメーション制御（修正ポイント：条件を厳密に）
            if (player.body.touching.down) {
                jumpCount = 0;
                if (!player.anims.isPlaying) player.play('run');
            } else {
                player.anims.stop();
                player.setTexture('cat'); // 空中では1コマ目固定
            }

            if (player.y > 850) gameOver.call(this);
            scoreText.setText(`Score: ${Math.floor(totalScore)}m\n${scoreMultiplier > 1 ? '!! DOUBLE SCORE !!' : ''}`);
        }

        function jump() {
            if (isGameOver) return;
            if (bgm && !bgm.isPlaying) bgm.play();
            if (jumpCount < maxJumps) { 
                player.setVelocityY(-550); 
                jumpCount++; 
            }
        }

        function spawnObstacle() {
            if (isGameOver) return;
            let x = 600;
            if (Math.random() > 0.2) {
                let nextY = Phaser.Math.Clamp(lastGroundY + Phaser.Math.Between(-50, 50), 450, 720);
                let g = grounds.create(x, nextY, 'ground');
                g.body.checkCollision.down = false;
                g.body.checkCollision.left = false;
                g.body.checkCollision.right = false;
                lastGroundY = nextY;
            }
            
            const h = lastGroundY - 80;
            let st = Math.random();
            if (st < 0.1) { enemies.create(x, h, 'bee'); } 
            else if (st < 0.2) { 
                let it = Math.random();
                let item;
                if (it < 0.25) item = items.create(x, h, 'banana').setName('banana');
                else if (it < 0.5) item = items.create(x, h, 'budo').setName('budo');
                else if (it < 0.75) item = items.create(x, h, '035').setName('035');
                else item = items.create(x, h, 'hogo_cat').setName('hogo_cat');
            } 
            else if (st < 0.35) { coins.create(x, h, 'shiro_coin'); }
        }

        function collectItem(p, i) {
            const type = i.name; i.destroy();
            if (type === 'banana') { 
                itemCounts.banana++; maxJumps = 3;
                if (timerBanana) timerBanana.remove();
                timerBanana = this.time.delayedCall(5000, () => { maxJumps = 2; });
            } else if (type === 'budo') { 
                itemCounts.budo++; scoreMultiplier = 2; p.setTint(0xff00ff);
                if (timerBudo) timerBudo.remove();
                timerBudo = this.time.delayedCall(5000, () => { scoreMultiplier = 1; p.clearTint(); });
            } else if (type === '035') { 
                itemCounts.cat035++; isInvincible = true; p.setAlpha(0.5);
                if (timer035) timer035.remove();
                timer035 = this.time.delayedCall(5000, () => { isInvincible = false; p.setAlpha(1); });
            } else if (type === 'hogo_cat') { itemCounts.hogo++; gameSpeed *= 0.95; }
        }

        function collectCoin(p, c) { c.destroy(); itemCounts.shiro++; bonusScore += 500; }
        function hitEnemy(p, e) { if (isInvincible) e.destroy(); else gameOver.call(this); }

        function gameOver() {
            if (isGameOver) return;
            isGameOver = true;
            this.physics.pause();
            if (bgm) bgm.stop();
            seGameOver.play();
            
            const finalScore = Math.floor(score + bonusScore);
            this.add.rectangle(225, 400, 450, 800, 0x000000, 0.85);
            this.add.text(225, 150, 'GAME OVER', { fontSize: '48px', fill: '#f00', fontWeight: 'bold' }).setOrigin(0.5);
            this.add.text(225, 250, `${finalScore}m 走破`, { fontSize: '32px', fill: '#fff' }).setOrigin(0.5);
            
            const btnStyle = { fontSize: '20px', fill: '#000', backgroundColor: '#fff', padding: {x:20, y:10} };
            const xBtn = this.add.text(225, 450, 'Xで結果を共有', { ...btnStyle, backgroundColor: '#1DA1F2', fill: '#fff' }).setOrigin(0.5).setInteractive();
            xBtn.on('pointerdown', () => shareToX(finalScore));

            const restartBtn = this.add.text(225, 600, 'Tap to Restart', { fontSize: '28px', fill: '#ffff00' }).setOrigin(0.5).setInteractive();
            restartBtn.on('pointerdown', () => this.scene.restart());
        }

        function shareToX(fScore) {
            const itemsStr = `🍌x${itemCounts.banana} 🍇x${itemCounts.budo} 035x${itemCounts.cat035} 🐈x${itemCounts.hogo} 🪙x${itemCounts.shiro}`;
            const text = encodeURIComponent(`🐈 $SHIRO cat run 🐈\n${fScore}m 走破！\n獲得：${itemsStr}\n\n▼ プレイはこちら\n${GAME_URL}\n#ShiroCatRun $SHIRO`);
            window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>$SHIRO cat run🐈</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        const SERVER_URL = 'https://aozora-sky.github.io/shiro-cat-run/';

        const GAME_WIDTH = 450;
        const GAME_HEIGHT = 800;
        const FALL_GAMEOVER_Y = GAME_HEIGHT + 60;

        const config = {
            type: Phaser.AUTO,
            width: GAME_WIDTH,
            height: GAME_HEIGHT,
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 1600 },
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        let player, grounds, enemies, items, coins;
        let score = 0, bonusScore = 0, gameSpeed = 5;
        let jumpCount = 0, maxJumps = 2;
        let isInvincible = false, scoreMultiplier = 1;
        let scoreText, scoreTimer;
        let lastGroundY = 700, lastEnemyX = 0, isGameOver = false;
        let bgm, seGameOver;
        let itemCounts = { banana: 0, budo: 0, cat035: 0, hogo: 0, shiro: 0 };
        let playCount = parseInt(localStorage.getItem('shiro_play_count') || '0', 10);
        let currentBgKey = 'daytime';
        let timerBanana = null, timerBudo = null, timer035 = null;
        let spawnTimer = null;

        let playerState = 'idle';
        let lastGroundedTime = 0;
        let wasOnGroundForLanding = false;

        function preload() {
            this.load.image('daytime', 'assets/daytime.jpg');
            this.load.image('sunset', 'assets/sunset.jpg');
            this.load.image('night', 'assets/night.jpg');
            this.load.image('moon', 'assets/moon.jpg');

            this.load.image('cat', 'assets/cat.png');
            this.load.image('cat1', 'assets/cat1.png');

            this.load.image('ground', 'assets/ground.png');
            this.load.image('bee', 'assets/bee.png');
            this.load.image('banana', 'assets/banana.png');
            this.load.image('budo', 'assets/budo.png');
            this.load.image('035', 'assets/035.png');
            this.load.image('hogo_cat', 'assets/hogo_cat.png');
            this.load.image('shiro_coin', 'assets/shiro_coin.png');

            this.load.audio('music', 'assets/music.mp3');
            this.load.audio('gameover_se', 'assets/gameover.mp3');
        }

        function create() {
            score = 0;
            bonusScore = 0;
            gameSpeed = 5;
            jumpCount = 0;
            maxJumps = 2;
            isInvincible = false;
            scoreMultiplier = 1;
            lastGroundY = 700;
            lastEnemyX = 0;
            isGameOver = false;
            currentBgKey = 'daytime';
            playerState = 'idle';
            lastGroundedTime = 0;
            wasOnGroundForLanding = false;

            itemCounts = { banana: 0, budo: 0, cat035: 0, hogo: 0, shiro: 0 };
            timerBanana = null;
            timerBudo = null;
            timer035 = null;

            playCount++;
            localStorage.setItem('shiro_play_count', playCount);

            this.physics.world.TILE_BIAS = 40;
            this.physics.world.setBounds(0, 0, GAME_WIDTH, GAME_HEIGHT + 1000);

            if (!bgm) {
                bgm = this.sound.add('music', { loop: true, volume: 0.5 });
            }
            seGameOver = this.sound.add('gameover_se', { volume: 0.7 });

            this.backGround = this.add.tileSprite(GAME_WIDTH / 2, GAME_HEIGHT / 2, GAME_WIDTH, GAME_HEIGHT, 'daytime');

            grounds = this.physics.add.group({
                allowGravity: false,
                immovable: true
            });

            enemies = this.physics.add.group({
                allowGravity: false
            });

            items = this.physics.add.group({
                allowGravity: false
            });

            coins = this.physics.add.group({
                allowGravity: false
            });

            if (!this.anims.exists('run')) {
                this.anims.create({
                    key: 'run',
                    frames: [
                        { key: 'cat' },
                        { key: 'cat1' }
                    ],
                    frameRate: 6,
                    repeat: -1
                });
            }

            player = this.physics.add.sprite(100, 400, 'cat');

            player.body.setSize(player.width * 0.60, player.height * 0.78);
            player.body.setOffset(player.width * 0.20, player.height * 0.18);

            player.setCollideWorldBounds(false);
            player.setBounce(0);
            player.setMaxVelocity(1000, 1400);

            scoreText = this.add.text(20, 20, '', {
                fontSize: '24px',
                fill: '#fff',
                stroke: '#000',
                strokeThickness: 4
            }).setDepth(1000);

            this.physics.add.collider(player, grounds);
            this.physics.add.overlap(player, enemies, hitEnemy, null, this);
            this.physics.add.overlap(player, items, collectItem, null, this);
            this.physics.add.overlap(player, coins, collectCoin, null, this);

            scoreTimer = this.time.addEvent({
                delay: 100,
                callback: () => {
                    score += (1 * scoreMultiplier);
                },
                callbackScope: this,
                loop: true
            });

            spawnTimer = this.time.addEvent({
                delay: 350,
                callback: spawnObstacle,
                callbackScope: this,
                loop: true
            });

            for (let i = 0; i < 5; i++) {
                createGround.call(this, i * 128, 700);
            }

            setPlayerState('run');

            this.input.on('pointerdown', jump, this);
        }

        function update() {
            if (isGameOver) return;

            const totalScore = score + bonusScore;
            let nextKey = currentBgKey;

            if (totalScore >= 30000) {
                nextKey = 'moon';
            } else {
                const cycle = Math.floor(totalScore / 5000) % 4;
                if (cycle === 1 || cycle === 3) nextKey = 'sunset';
                else if (cycle === 2) nextKey = 'night';
                else nextKey = 'daytime';
            }

            if (currentBgKey !== nextKey) {
                currentBgKey = nextKey;
                this.backGround.setTexture(nextKey);
            }

            this.backGround.tilePositionX += gameSpeed * 0.5;
            gameSpeed += 0.0005;

            const worldSpeed = -(gameSpeed * 60);

            setGroupVelocityAndCleanup(grounds, worldSpeed, -150);
            setGroupVelocityAndCleanup(enemies, worldSpeed, -150);
            setGroupVelocityAndCleanup(items, worldSpeed, -150);
            setGroupVelocityAndCleanup(coins, worldSpeed, -150);

            if (player.y > FALL_GAMEOVER_Y) {
                gameOver.call(this);
                return;
            }

            const body = player.body;

            const physicallyOnGround =
                body.blocked.down || body.touching.down;

            const groundedRecently =
                (this.time.now - lastGroundedTime) <= 80 &&
                body.velocity.y >= 0;

            const onGroundForAnimation = physicallyOnGround || groundedRecently;

            // ジャンプ回数リセットは「実着地した瞬間だけ」
            if (physicallyOnGround && !wasOnGroundForLanding && body.velocity.y >= 0) {
                jumpCount = 0;
                lastGroundedTime = this.time.now;
            }

            wasOnGroundForLanding = physicallyOnGround;

            if (onGroundForAnimation) {
                setPlayerState('run');
            } else {
                setPlayerState('jump');
            }

            scoreText.setText(
                `Score: ${Math.floor(totalScore)}m\n${scoreMultiplier > 1 ? '!! DOUBLE SCORE !!' : ''}`
            );
        }

        function setPlayerState(state) {
            if (!player || playerState === state) return;
            playerState = state;

            if (state === 'run') {
                player.play('run', true);
            } else if (state === 'jump') {
                player.anims.stop();
                player.setTexture('cat');
            }
        }

        function setGroupVelocityAndCleanup(group, velocityX, destroyX) {
            group.getChildren().forEach(child => {
                if (!child.body) return;
                child.body.setVelocityX(velocityX);
                if (child.x < destroyX) {
                    child.destroy();
                }
            });
        }

        function createGround(x, y) {
            const g = grounds.create(x, y, 'ground');
            g.setOrigin(0.5, 0.5);
            g.body.setAllowGravity(false);
            g.body.setImmovable(true);
            g.body.setVelocityX(-(gameSpeed * 60));
            g.body.checkCollision.down = false;
            g.body.checkCollision.left = false;
            g.body.checkCollision.right = false;
            return g;
        }

        function jump() {
            if (isGameOver) return;

            if (bgm && !bgm.isPlaying) {
                bgm.play();
            }

            if (jumpCount < maxJumps) {
                player.setVelocityY(-550);
                jumpCount++;
                wasOnGroundForLanding = false;
                setPlayerState('jump');
            }
        }

        function spawnObstacle() {
            if (isGameOver) return;

            const x = 600;

            if (Math.random() > 0.19) {
                const nextY = Phaser.Math.Clamp(
                    lastGroundY + Phaser.Math.Between(-40, 40),
                    500,
                    750
                );
                createGround.call(this, x, nextY);
                lastGroundY = nextY;
            }

            const h = Phaser.Math.RND.pick([
                lastGroundY - 60,
                lastGroundY - 120,
                lastGroundY - 180
            ]);

            const st = Math.random();

            if (st < 0.12 && (x - lastEnemyX > 100)) {
                const enemy = enemies.create(x, h, 'bee');
                enemy.body.setAllowGravity(false);
                enemy.body.setVelocityX(-(gameSpeed * 60));
                lastEnemyX = x;
            } else if (st < 0.17) {
                const it = Math.random();
                let item;

                if (it < 0.2) item = items.create(x, h, 'banana').setName('banana');
                else if (it < 0.4) item = items.create(x, h, 'budo').setName('budo');
                else if (it < 0.6) item = items.create(x, h, '035').setName('035');
                else item = items.create(x, h, 'hogo_cat').setName('hogo_cat');

                item.body.setAllowGravity(false);
                item.body.setVelocityX(-(gameSpeed * 60));
            } else if (st < 0.30) {
                const coin = coins.create(x, h, 'shiro_coin');
                coin.body.setAllowGravity(false);
                coin.body.setVelocityX(-(gameSpeed * 60));
            }

            lastEnemyX -= gameSpeed;
        }

        function collectItem(p, i) {
            const type = i.name;
            i.destroy();

            if (type === 'banana') {
                itemCounts.banana++;
                maxJumps = 3;

                if (timerBanana) timerBanana.remove(false);
                timerBanana = this.time.delayedCall(5000, () => {
                    maxJumps = 2;
                });

            } else if (type === 'budo') {
                itemCounts.budo++;
                scoreMultiplier = 2;
                p.setTint(0xff00ff);

                if (timerBudo) timerBudo.remove(false);
                timerBudo = this.time.delayedCall(5000, () => {
                    scoreMultiplier = 1;
                    p.clearTint();
                });

            } else if (type === '035') {
                itemCounts.cat035++;
                isInvincible = true;
                p.setAlpha(0.5);

                if (timer035) timer035.remove(false);
                timer035 = this.time.delayedCall(5000, () => {
                    isInvincible = false;
                    p.setAlpha(1);
                });

            } else if (type === 'hogo_cat') {
                itemCounts.hogo++;
                gameSpeed *= 0.975;
            }
        }

        function collectCoin(p, c) {
            c.destroy();
            itemCounts.shiro++;
            bonusScore += 500;
        }

        function hitEnemy(p, e) {
            if (isInvincible) {
                e.destroy();
            } else {
                gameOver.call(this);
            }
        }

        async function gameOver() {
            if (isGameOver) return;
            isGameOver = true;

            this.physics.pause();

            if (player) {
                player.setVelocity(0, 0);
                player.anims.stop();
            }

            if (scoreTimer) scoreTimer.remove(false);
            if (spawnTimer) spawnTimer.remove(false);
            if (timerBanana) timerBanana.remove(false);
            if (timerBudo) timerBudo.remove(false);
            if (timer035) timer035.remove(false);

            if (bgm && bgm.isPlaying) bgm.stop();
            if (seGameOver) seGameOver.play();

            const finalScore = Math.floor(score + bonusScore);

            this.add.rectangle(225, 400, 450, 800, 0x000000, 0.9).setDepth(2000);
            this.add.text(225, 60, 'GAME OVER', {
                fontSize: '40px',
                fill: '#f00',
                fontWeight: 'bold'
            }).setOrigin(0.5).setDepth(2001);

            this.add.text(225, 120, `走破距離 ${finalScore}m`, {
                fontSize: '28px',
                fill: '#fff'
            }).setOrigin(0.5).setDepth(2001);

            const itemText = `🍌x${itemCounts.banana} 🍇x${itemCounts.budo} 035x${itemCounts.cat035} 🐈x${itemCounts.hogo} 🪙x${itemCounts.shiro}`;
            this.add.text(225, 160, itemText, {
                fontSize: '18px',
                fill: '#ffff00'
            }).setOrigin(0.5).setDepth(2001);

            this.add.text(225, 220, 'ーー TOP RANKING ーー', {
                fontSize: '18px',
                fill: '#aaa'
            }).setOrigin(0.5).setDepth(2001);

            fetchRanking.call(this);

            const btnStyle = {
                fontSize: '20px',
                fill: '#000',
                backgroundColor: '#fff',
                padding: { x: 20, y: 10 }
            };

            const regBtn = this.add.text(225, 520, 'ランキングに登録する', btnStyle)
                .setOrigin(0.5)
                .setInteractive()
                .setDepth(2001);

            regBtn.on('pointerdown', () => registerRanking(finalScore));

            const xBtn = this.add.text(225, 590, 'X (Twitter) で共有', {
                ...btnStyle,
                backgroundColor: '#1DA1F2',
                fill: '#fff'
            })
                .setOrigin(0.5)
                .setInteractive()
                .setDepth(2001);

            xBtn.on('pointerdown', () => shareToX(finalScore));

            const restartBtn = this.add.text(225, 700, 'Tap to Restart', {
                fontSize: '24px',
                fill: '#ffff00'
            })
                .setOrigin(0.5)
                .setInteractive()
                .setDepth(2001);

            restartBtn.on('pointerdown', () => this.scene.restart());

            this.add.text(225, 740, 'Produced by aoba724（あおぞら）', {
                fontSize: '14px',
                fill: '#ffffff'
            }).setOrigin(0.5).setDepth(2001);
        }

        async function fetchRanking() {
            const dummy = [
                { name: "ShiroMaster", score: 15400 },
                { name: "NekoRun", score: 12000 },
                { name: "035Lover", score: 8500 }
            ];

            dummy.forEach((item, i) => {
                this.add.text(225, 260 + (i * 35), `${i + 1}. ${item.name} - ${item.score}m`, {
                    fontSize: '20px',
                    fill: '#fff'
                }).setOrigin(0.5).setDepth(2001);
            });
        }

        function registerRanking(fScore) {
            const name = prompt("ユーザーネームを入力してください", "Player");
            if (name) {
                alert("ランキングに送信しました！");
            }
        }

        function shareToX(fScore) {
            const totalItems =
                itemCounts.banana +
                itemCounts.budo +
                itemCounts.cat035 +
                itemCounts.hogo +
                itemCounts.shiro;

            const itemsStr = `🍌x${itemCounts.banana} 🍇x${itemCounts.budo} 035x${itemCounts.cat035} 🐈x${itemCounts.hogo} 🪙x${itemCounts.shiro}`;

            const text = encodeURIComponent(
                `$SHIRO cat runで ${fScore}m 走破しました！\nItem ×${totalItems}個（${itemsStr}）\n\nゲームプレイはこちらから\n${SERVER_URL}\n\n#ShiroCatRun $SHIRO #035HP`
            );

            window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
        }
    </script>
</body>
</html>
